<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Super Admin - Feature Flags</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 760px; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-size: 1.4rem; } h2 { font-size: 1.1rem; }
    section { border: 1px solid #ccc; border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }
    input { padding: .45rem; margin: .2rem 0; width: 100%; box-sizing: border-box; }
    button { padding: .5rem 1rem; cursor: pointer; margin-top: .5rem; }
    table { border-collapse: collapse; width: 100%; margin-top: .5rem; }
    th, td { border: 1px solid #ddd; padding: .4rem; text-align: left; font-size: .88rem; }
    code { background: #f4f4f4; padding: .1rem .3rem; border-radius: 4px; }
    .hidden { display: none; }
    .msg { margin-top: .5rem; font-size: .9rem; }
    .error { color: #c00; } .success { color: #080; }
  </style>
</head>
<body>
  <h1>Super Admin Console</h1>

  <section id="login-section">
    <h2>Login</h2>
    <input id="sa-email" type="email" placeholder="Email" />
    <input id="sa-password" type="password" placeholder="Password" />
    <button id="login-btn">Log in</button>
    <div id="login-msg" class="msg"></div>
  </section>

  <section id="console-section" class="hidden">
    <h2>Create Organization</h2>
    <input id="org-name" type="text" placeholder="Organization name" />
    <button id="create-btn">Create</button>
    <div id="create-msg" class="msg"></div>
    <hr />
    <h2>Organizations
      <button id="refresh-btn" style="float:right">Refresh</button>
      <button id="logout-btn" style="float:right">Log out</button>
    </h2>
    <table id="org-table">
      <thead><tr><th>ID</th><th>Name</th><th>Admin code</th><th>User code</th></tr></thead>
      <tbody></tbody>
    </table>
  </section>

  <script src="app.js"></script>
</body>
</html>
