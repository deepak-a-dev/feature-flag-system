<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Org Admin — Feature Flags</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 760px; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-size: 1.4rem; } h2 { font-size: 1.1rem; }
    section { border: 1px solid #ccc; border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }
    input[type=email], input[type=password], input[type=text] { padding: .45rem; margin: .2rem 0; width: 100%; box-sizing: border-box; }
    button { padding: .5rem 1rem; cursor: pointer; margin-top: .5rem; }
    .row-btn { padding: .25rem .6rem; margin: 0 .2rem 0 0; }
    table { border-collapse: collapse; width: 100%; margin-top: .5rem; }
    th, td { border: 1px solid #ddd; padding: .4rem; text-align: left; font-size: .88rem; }
    .hidden { display: none; }
    .msg { margin-top: .5rem; font-size: .9rem; }
    .error { color: #c00; } .success { color: #080; }
    .on { color: #080; font-weight: bold; } .off { color: #999; }
    a { cursor: pointer; color: #06c; text-decoration: underline; }
    label { font-size: .9rem; }
  </style>
</head>
<body>
  <h1>Organization Admin</h1>

  <section id="signup-section">
    <h2>Sign Up</h2>
    <input id="su-email" type="email" placeholder="Email" />
    <input id="su-password" type="password" placeholder="Password" />
    <input id="su-code" type="text" placeholder="Admin invite code" />
    <button id="signup-btn">Sign up</button>
    <div id="signup-msg" class="msg"></div>
    <p>Already have an account? <a id="to-login">Log in</a></p>
  </section>

  <section id="login-section" class="hidden">
    <h2>Log In</h2>
    <input id="li-email" type="email" placeholder="Email" />
    <input id="li-password" type="password" placeholder="Password" />
    <button id="login-btn">Log in</button>
    <div id="login-msg" class="msg"></div>
    <p>Need an account? <a id="to-signup">Sign up</a></p>
  </section>

  <section id="dashboard-section" class="hidden">
    <p id="org-banner" style="font-weight:bold; color:#333;"></p>
    <h2>Create Feature Flag <button id="logout-btn" style="float:right">Log out</button></h2>
    <input id="flag-key" type="text" placeholder="Feature key (e.g. dark_mode)" />
    <label><input id="flag-enabled" type="checkbox" /> Enabled</label>
    <button id="create-flag-btn">Create flag</button>
    <div id="create-flag-msg" class="msg"></div>
    <hr />
    <h2>Feature Flags <button id="refresh-btn" style="float:right">Refresh</button></h2>
    <table id="flag-table">
      <thead><tr><th>Key</th><th>Status</th><th>Actions</th></tr></thead>
      <tbody></tbody>
    </table>
  </section>

  <script src="app.js"></script>
</body>
</html>
